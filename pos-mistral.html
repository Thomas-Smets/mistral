      // --- VAT breakdown helper ---
      function computeVatBreakdown(items) {
        const summary = {};
        const lines = items.map((item) => {
          const gross = item.price * item.qty;
          const net = gross / (1 + item.vat);
          const vatAmt = gross - net;
          const rate = item.vat;
          if (!summary[rate]) summary[rate] = { net: 0, vat: 0, gross: 0 };
          summary[rate].net += net;
          summary[rate].vat += vatAmt;
          summary[rate].gross += gross;
          return {
            name: item.name,
            qty: item.qty,
            unitGross: item.price,
            vatRate: item.vat,
            lineNet: net,
            lineVat: vatAmt,
            lineGross: gross,
          };
        });
        Object.keys(summary).forEach((rate) => {
          summary[rate].net = roundToCents(summary[rate].net);
          summary[rate].vat = roundToCents(summary[rate].vat);
          summary[rate].gross = roundToCents(summary[rate].gross);
        });
        return { lines, summary };
      }

      // --- PDF generator ---
      function downloadVatTicketPDF(ticket, opts = { format: "receipt" }) {
        const jsPDFCtor = getJsPDFCtor();
        if (!jsPDFCtor) {
          alert(
            "PDF engine (jsPDF) failed to load. Please check your internet connection or allow CDN scripts.",
          );
          return;
        }
        const fmt = (n) =>
          new Intl.NumberFormat(undefined, {
            style: "currency",
            currency: "EUR",
          }).format(roundToCents(n));
        const doc = new jsPDFCtor({
          unit: "mm",
          format: opts.format === "a4" ? "a4" : [80, 200],
        });
        if (typeof doc.autoTable !== "function") {
          alert(
            "jsPDF AutoTable plugin not loaded. PDF will not include tables. Please ensure CDN access.",
          );
        }
        const pageWidth = doc.internal.pageSize.getWidth();
        const marginX = 5;
        let y = 8;

        // Header
        doc.setFontSize(13);
        doc.text(ticket.business.name || "Business", marginX, y);
        y += 5;
        doc.setFontSize(9);
        if (ticket.business.address) {
          doc.text(ticket.business.address, marginX, y);
          y += 4;
        }
        if (ticket.business.vatNumber) {
          doc.text(`VAT: ${ticket.business.vatNumber}`, marginX, y);
          y += 5;
        }
        doc.setDrawColor(150);
        doc.line(marginX, y, pageWidth - marginX, y);
        y += 3;

        // Meta
        doc.setFontSize(9);
        if (ticket.receiptNo) {
          doc.text(`Receipt: ${ticket.receiptNo}`, marginX, y);
          y += 4;
        }
        doc.text(
          `Date: ${new Date(ticket.timestamp).toLocaleString()}`,
          marginX,
          y,
        );
        y += 4;
        doc.text(`Table: ${ticket.table}`, marginX, y);
        y += 2;

        // Items
        const itemsBody = ticket.lines.map((line) => [
          `${line.qty} × ${line.name}`,
          fmt(line.unitGross),
          `${(line.vatRate * 100).toFixed(0)}%`,
          fmt(line.lineGross),
        ]);
        if (typeof doc.autoTable === "function") {
          doc.autoTable({
            startY: y,
            head: [["Item", "Unit (incl.)", "VAT", "Total"]],
            body: itemsBody,
            theme: "plain",
            styles: { fontSize: 8, cellPadding: 1 },
            headStyles: { fillColor: [245, 245, 245] },
            columnStyles: {
              1: { halign: "right" },
              2: { halign: "right" },
              3: { halign: "right" },
            },
          });
          y = doc.lastAutoTable.finalY + 2;
          doc.line(marginX, y, pageWidth - marginX, y);
          y += 2;
        } else {
          doc.text("Items:", marginX, y);
          y += 4;
          itemsBody.forEach((row) => {
            doc.text(`${row[0]}  ${row[1]}  ${row[2]}  ${row[3]}`, marginX, y);
            y += 4;
          });
          y += 2;
        }

        // Totals
        if (typeof doc.autoTable === "function") {
          doc.autoTable({
            startY: y,
            theme: "plain",
            styles: { fontSize: 9, cellPadding: { top: 0.5, bottom: 0.5 } },
            body: [
              ["Subtotal (excl. VAT)", fmt(ticket.totals.subtotal)],
              ["VAT total", fmt(ticket.totals.tax)],
              [
                { content: "Total (incl. VAT)", styles: { fontStyle: "bold" } },
                {
                  content: fmt(ticket.totals.total),
                  styles: { fontStyle: "bold", halign: "right" },
                },
              ],
            ],
            columnStyles: {
              0: { cellWidth: pageWidth - marginX * 2 - 34 },
              1: { halign: "right", cellWidth: 34 },
            },
          });
          y = doc.lastAutoTable.finalY + 3;
        } else {
          doc.text(
            `Subtotal (excl. VAT): ${fmt(ticket.totals.subtotal)}`,
            marginX,
            y,
          );
          y += 4;
          doc.text(`VAT total: ${fmt(ticket.totals.tax)}`, marginX, y);
          y += 4;
          doc.text(
            `Total (incl. VAT): ${fmt(ticket.totals.total)}`,
            marginX,
            y,
          );
          y += 6;
        }

        // VAT breakdown
        const vatRows = Object.keys(ticket.vatSummary)
          .sort()
          .map((rate) => {
            const entry = ticket.vatSummary[rate];
            return [
              `${(parseFloat(rate) * 100).toFixed(0)}%`,
              fmt(entry.net),
              fmt(entry.vat),
              fmt(entry.gross),
            ];
          });
        if (typeof doc.autoTable === "function") {
          doc.setFontSize(9);
          doc.text("VAT breakdown", marginX, y);
          y += 1;
          doc.autoTable({
            startY: y,
            head: [["Rate", "Net", "VAT", "Gross"]],
            body: vatRows,
            theme: "plain",
            styles: { fontSize: 8, cellPadding: 1 },
            headStyles: { fillColor: [245, 245, 245] },
            columnStyles: {
              1: { halign: "right" },
              2: { halign: "right" },
              3: { halign: "right" },
            },
          });
          y = doc.lastAutoTable.finalY + 3;
        }

        // Payment + comment + footer
        doc.setFontSize(9);
        doc.text(`Payment: ${ticket.paymentMethod}`, marginX, y);
        y += 4;
        if (ticket.comment) {
          doc.setTextColor(90);
          doc.text(`Comment: ${ticket.comment}`, marginX, y);
          doc.setTextColor(0);
          y += 4;
        }
        if (ticket.footerNote) {
          doc.setTextColor(90);
          doc.text(ticket.footerNote, marginX, y);
          doc.setTextColor(0);
        }

        const fileName = (
          ticket.receiptNo
            ? `${ticket.receiptNo}.pdf`
            : `Receipt_${new Date(ticket.timestamp).toISOString()}.pdf`
        ).replace(/[:]/g, "-");
        try {
          doc.save(fileName);
        } catch (e) {
          alert(
            "Unable to download PDF. If you are in an in-app browser, try opening in Chrome/Edge/Safari.",
          );
        }
      }

        );
        const [showSettings, setShowSettings] = useState(false);
        const [confirmingClear, setConfirmingClear] = useState(false);
        const [confirmingReset, setConfirmingReset] = useState(false);
        const [diag, setDiag] = useState(getLibDiag());

        useEffect(() => {
          const timeout = setTimeout(() => setDiag(getLibDiag()), 800);
          return () => clearTimeout(timeout);
        }, []);

        const emptyTable = {
          items: [],
          cashPaid: false,
          comment: "",
          receiptNo: null,
        };
        const current = orders[selectedTable] || emptyTable;

        const totals = useMemo(() => {
          const items = (orders[selectedTable] || emptyTable).items;
          const gross = items.reduce(
            (sum, item) => sum + item.price * item.qty,
            0,
          );
          const net = items.reduce(
            (sum, item) => sum + (item.price * item.qty) / (1 + item.vat),
            0,
          );
          return { subtotal: net, tax: gross - net, total: gross };
        }, [orders, selectedTable]);

        function cloneTableState(prev) {
          const existing = prev[selectedTable] || emptyTable;
          return {
            ...existing,
            items: existing.items.map((item) => ({ ...item })),
          };
        }

        function addItemByIndex(idx) {
          const menuItem = menu[idx];
          const key = menuItem.id || String(idx);
          let newItem = { ...menuItem };
          if (menuItem.id === "custom_food" || menuItem.id === "custom_drink") {
            const name =
              prompt("Enter item name:", menuItem.name) || menuItem.name;
            const price = parseFloat(prompt("Enter price (EUR):", "0"));
            if (isNaN(price) || price <= 0) return;
            const vatInput = prompt(
              "Enter VAT rate (e.g. 0.12 for 12%, 0.21 for 21%):",
              menuItem.vat,
            );
            const vat = parseFloat(vatInput);
            if (isNaN(vat) || vat < 0) return;
            newItem = { ...menuItem, name, price, vat };
          }
          setOrders((prev) => {
            const table = cloneTableState(prev);
            if (menuItem.id && menuItem.id.startsWith("custom_")) {
              const uniqueKey = key + "_" + Date.now();
              table.items.push({ ...newItem, qty: 1, key: uniqueKey });
            } else {
              const existing = table.items.find((item) => item.key === key);
              if (existing) existing.qty += 1;
              else table.items.push({ ...newItem, qty: 1, key });
            }
            return { ...prev, [selectedTable]: table };
          });
        }

        function changeQty(key, delta) {
          setOrders((prev) => {
            const table = cloneTableState(prev);
            const existing = table.items.find((item) => item.key === key);
            if (!existing) return prev;
            existing.qty += delta;
            if (existing.qty <= 0)
              table.items = table.items.filter((item) => item.key !== key);
            return { ...prev, [selectedTable]: table };
          });
        }

        function removeItem(key) {
          setOrders((prev) => {
            const table = cloneTableState(prev);
            table.items = table.items.filter((item) => item.key !== key);
            return { ...prev, [selectedTable]: table };
          });
        }

        function setCashPaidForCurrent(val) {
          setOrders((prev) => {
            const table = cloneTableState(prev);
            table.cashPaid = val;
            return { ...prev, [selectedTable]: table };
          });
        }

        function clearCurrentTable() {
          if (!confirmingClear) {
            setConfirmingClear(true);
            setTimeout(() => setConfirmingClear(false), 3000);
            return;
          }
          setConfirmingClear(false);
          setOrders((prev) => ({
            ...prev,
            [selectedTable]: { ...emptyTable },
          }));
        }

        function closeOrder() {
          const tableOrder = orders[selectedTable] || emptyTable;
          if (!tableOrder.items.length) return;
          const gross = tableOrder.items.reduce(
            (sum, item) => sum + item.price * item.qty,
            0,
          );
          const net = tableOrder.items.reduce(
            (sum, item) => sum + (item.price * item.qty) / (1 + item.vat),
            0,
          );
          const totalsSnapshot = {
            subtotal: net,
            tax: gross - net,
            total: gross,
          };
          setOverview((prev) => [
            ...prev,
            {
              table: selectedTable,
              items: tableOrder.items,
              totals: totalsSnapshot,
              timestamp: new Date().toISOString(),
              cashPaid: tableOrder.cashPaid,
              comment: tableOrder.comment || "",
              receiptNo: tableOrder.receiptNo || null,
            },
          ]);
          setOrders((prev) => ({
            ...prev,
            [selectedTable]: { ...emptyTable },
          }));
        }

        function exportExcel() {
          if (!window.XLSX) {
            alert(
              "XLSX library not loaded. Please check your internet connection.",
            );
            return;
          }
          const overviewRows = overview.map((order, idx) => ({
            Index: idx + 1,
            Table: order.table,
            Timestamp: order.timestamp,
            CashPaid: order.cashPaid,
            Comment: order.comment || "",
            ReceiptNo: order.receiptNo || "",
            SubtotalNet_EUR: roundToCents(order.totals.subtotal),
            VAT_EUR: roundToCents(order.totals.tax),
            TotalGross_EUR: roundToCents(order.totals.total),
          }));
          const lineRows = [];
          overview.forEach((order, idx) => {
            (order.items || []).forEach((item) => {
              const gross = item.price * item.qty;
              const net = gross / (1 + item.vat);
              const vatAmt = gross - net;
              lineRows.push({
                OverviewIndex: idx + 1,
                Table: order.table,
                Timestamp: order.timestamp,
                CashPaid: order.cashPaid,
                ReceiptNo: order.receiptNo || "",
                ItemName: item.name,
                Qty: item.qty,
                UnitPriceGross_EUR: roundToCents(item.price),
                VAT_Rate: item.vat,
                LineNet_EUR: roundToCents(net),
                LineVAT_EUR: roundToCents(vatAmt),
                LineGross_EUR: roundToCents(gross),
              });
            });
          });
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(
            wb,
            XLSX.utils.json_to_sheet(overviewRows),
            "Overview",
          );
          XLSX.utils.book_append_sheet(
            wb,
            XLSX.utils.json_to_sheet(lineRows),
            "LineItems",
          );
          XLSX.writeFile(wb, "POS_Export.xlsx");
        }

        function resetOverview() {
          if (!confirmingReset) {
            setConfirmingReset(true);
            setTimeout(() => setConfirmingReset(false), 3000);
            return;
          }
          setConfirmingReset(false);
          setOverview([]);
        }

        const grandTotal = overview.reduce(
          (sum, order) => sum + (order?.totals?.total || 0),
          0,
        );
        const filteredMenu =
          category === "All"
            ? menu
            : menu.filter((item) => item.category === category);

        function takeNextReceiptNumber() {
          let receiptNo;
          setSettings((prev) => {
            const num = prev?.nextReceiptNumber ?? 1;
            receiptNo = formatReceiptNo(prev.receiptPrefix || "", num);
            return { ...prev, nextReceiptNumber: num + 1 };
          });
          return receiptNo;
        }

        function downloadVatTicketForCurrent() {
          const jsPDFCtor = getJsPDFCtor();
          if (!jsPDFCtor) {
            alert(
              "PDF engine (jsPDF) not loaded. Open Settings to see diagnostics.",
            );
            return;
          }
          if (!current.items.length) {
            alert("No items in the order.");
            return;
          }
          let receiptNo = current.receiptNo;
          let assignedNow = false;
          if (!receiptNo) {
            receiptNo = takeNextReceiptNumber();
            assignedNow = true;
          }
          const { lines, summary } = computeVatBreakdown(current.items);
          const ticket = {
            business: {
              name: settings.businessName,
              address: settings.businessAddress,
              vatNumber: settings.vatNumber,
            },
            receiptNo,
            timestamp: new Date().toISOString(),
            table: selectedTable,
            paymentMethod: current.cashPaid ? "Cash" : "Card/Other",
            comment: current.comment || "",
            totals,
            lines,
            vatSummary: summary,
            footerNote: settings.footerNote || "",
          };
          downloadVatTicketPDF(ticket, { format: "receipt" });
          if (assignedNow) {
            setOrders((prev) => {
              const table = cloneTableState(prev);
              table.receiptNo = receiptNo;
              return { ...prev, [selectedTable]: table };
            });
          }
        }

        function downloadVatTicketFromOverview(index) {
          const jsPDFCtor = getJsPDFCtor();
          if (!jsPDFCtor) {
            alert(
              "PDF engine (jsPDF) not loaded. Open Settings to see diagnostics.",
            );
            return;
          }
          const order = overview[index];
          if (!order || !order.items?.length) {
            alert("No items on this order.");
            return;
          }
          let assignedNo = order.receiptNo;
          if (!assignedNo) {
            assignedNo = takeNextReceiptNumber();
            setOverview((prev) => {
              const copy = [...prev];
              copy[index] = { ...prev[index], receiptNo: assignedNo };
              return copy;
            });
          }
          const { lines, summary } = computeVatBreakdown(order.items);
          const ticket = {
            business: {
              name: settings.businessName,
              address: settings.businessAddress,
              vatNumber: settings.vatNumber,
            },
            receiptNo: assignedNo,
            timestamp: order.timestamp,
            table: order.table,
            paymentMethod: order.cashPaid ? "Cash" : "Card/Other",
            comment: order.comment || "",
            totals: order.totals,
            lines,
            vatSummary: summary,
            footerNote: settings.footerNote || "",
          };
          downloadVatTicketPDF(ticket, { format: "receipt" });
        }

        return (
          <div className="min-h-screen">
            <header className="bg-neutral-800 text-white px-4 py-3 flex items-center justify-between shadow-md">
              <h1 className="text-xl font-bold tracking-tight">Mistral POS</h1>
              <div className="flex items-center gap-3">
                <div className="text-xs text-neutral-400 hidden sm:block">
                  React {diag.reactOk ? "✓" : "✗"} · XLSX {diag.xlsxOk ? "✓" : "✗"} · PDF {diag.jsPdfOk ? "✓" : "✗"}
                </div>
                <button
                  onClick={() => setShowSettings(true)}
                  className="px-3 py-1 rounded-lg bg-neutral-700 hover:bg-neutral-600 text-sm text-neutral-200"
                >
                  Settings
                </button>
              </div>
            </header>
            <div className="p-4 max-w-6xl mx-auto">
            <Tabs tab={tab} setTab={setTab} />
            {showSettings && (
              <SettingsModal
                settings={settings}
                setSettings={setSettings}
                onClose={() => setShowSettings(false)}
              />
            )}
            {tab === "orders" && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {/* MENU */}
                <div className="md:col-span-2">
                  <div className="flex items-center justify-between mb-2">
                    <h2 className="font-semibold">Menu</h2>
                    <div className="flex gap-2">
                      {["All", "Food", "Drinks"].map((cat) => (
                        <button
                          key={cat}
                          onClick={() => setCategory(cat)}
                          className={
                            category === cat
                              ? "px-4 py-1.5 rounded-full bg-neutral-800 text-white text-sm font-medium shadow-sm"
                              : "px-4 py-1.5 rounded-full bg-neutral-200 text-neutral-600 text-sm hover:bg-neutral-300"
                          }
                        >
                          {cat}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                    {filteredMenu.map((menuItem) => {
                      const idx = menu.findIndex(
                        (item) => item.id === menuItem.id,
                      );
                      return (
                        <button
                          key={menuItem.id}
                          onClick={() => addItemByIndex(idx)}
                          className="border border-neutral-200 rounded-xl p-3 text-left bg-white shadow-sm hover:shadow-md hover:border-neutral-300 transition-shadow"
                        >
                          <div className="font-medium">{menuItem.name}</div>
                          <div className="text-sm text-neutral-500">
                            {eur(menuItem.price)} (incl. VAT{" "}
                            {(menuItem.vat * 100).toFixed(0)}%)
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>
                {/* ORDER */}
                <div className="bg-white rounded-xl shadow-sm border border-neutral-200 p-4 md:sticky md:top-4 self-start">
                  <div className="flex items-center justify-between mb-2">
                    <h2 className="font-semibold">
                      Table {selectedTable} Order
                    </h2>
                    <select
                      value={selectedTable}
                      onChange={(e) => setSelectedTable(e.target.value)}
                      className="border rounded px-2 py-1"
                    >
                      {TABLES.map((tableNum) => (
                        <option key={tableNum} value={tableNum}>
                          Table {tableNum}
                        </option>
                      ))}
                    </select>
                  </div>
                  {current.items.length === 0 ? (
                    <div className="text-neutral-500">No items</div>
                  ) : (
                    <ul className="space-y-2">
                      {current.items.map((item) => (
                        <li
                          key={item.key}
                          className="flex items-center justify-between gap-2 border-b pb-1"
                        >
                          <div className="flex-1">
                            <div className="font-medium">{item.name}</div>
                            <div className="text-sm text-neutral-500">
                              {item.qty} × {eur(item.price)}
                            </div>
                          </div>
                          <div className="flex items-center gap-1">
                            <button
                              onClick={() => changeQty(item.key, -1)}
                              className="w-8 h-8 flex items-center justify-center rounded-lg bg-neutral-100 hover:bg-neutral-200 text-neutral-600 font-medium"
                            >
                              −
                            </button>
                            <button
                              onClick={() => changeQty(item.key, +1)}
                              className="w-8 h-8 flex items-center justify-center rounded-lg bg-neutral-100 hover:bg-neutral-200 text-neutral-600 font-medium"
                            >
                              +
                            </button>
                            <button
                              onClick={() => removeItem(item.key)}
                              className="w-8 h-8 flex items-center justify-center rounded-lg bg-red-50 hover:bg-red-100 text-red-500"
                            >
                              ✕
                            </button>
                          </div>
                          <div className="w-24 text-right font-medium">
                            {eur(item.price * item.qty)}
                          </div>
                        </li>
                      ))}
                    </ul>
                  )}
                  <div className="mt-3 bg-neutral-50 rounded-lg p-3 text-sm space-y-1">
                    <div className="flex justify-between">
                      <span>Subtotal (excl. VAT)</span>
                      <span>{eur(roundToCents(totals.subtotal))}</span>
                    </div>
                    <div className="flex justify-between">
                      <span>VAT</span>
                      <span>{eur(roundToCents(totals.tax))}</span>
                    </div>
                    <div className="flex justify-between font-semibold">
                      <span>Total (incl. VAT)</span>
                      <span>{eur(roundToCents(totals.total))}</span>
                    </div>
                  </div>
                  <div className="mt-3 flex items-center gap-2">
                    <label className="flex items-center gap-2">
                      <input
                        type="checkbox"
                        checked={!!current.cashPaid}
                        onChange={(e) =>
                          setCashPaidForCurrent(e.target.checked)
                        }
                        className="w-4 h-4"
                      />
                      Paid in cash
                    </label>
                  </div>
                  <div className="mt-3">
                    <label
                      className="block font-medium mb-1"
                      htmlFor="order-comment"
                    >
                      Comment
                    </label>
                    <textarea
                      id="order-comment"
                      value={current.comment || ""}
                      onChange={(e) =>
                        setOrders((prev) => {
                          const table = cloneTableState(prev);
                          table.comment = e.target.value;
                          return { ...prev, [selectedTable]: table };
                        })
                      }
                      className="w-full border rounded p-2 text-sm"
                      placeholder="Add comment..."
                    />
                  </div>
                  <div className="mt-3 space-y-2">
                    <button
                      onClick={downloadVatTicketForCurrent}
                      className="w-full px-4 py-2 rounded-lg bg-neutral-800 hover:bg-neutral-700 text-white font-medium shadow-sm"
                    >
                      Download VAT Ticket (PDF)
                    </button>
                    <div className="grid grid-cols-2 gap-2">
                      <button
                        onClick={closeOrder}
                        className="w-full px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-medium shadow-sm"
                      >
                        Close Order
                      </button>
                      <button
                        onClick={clearCurrentTable}
                        className={confirmingClear
                          ? "w-full px-4 py-2 rounded-lg bg-red-600 text-white font-medium shadow-sm"
                          : "w-full px-4 py-2 rounded-lg border-2 border-red-400 text-red-600 hover:bg-red-50 font-medium"
                        }
                      >
                        {confirmingClear ? "Confirm?" : "Clear Table"}
                      </button>
                    </div>
                  </div>
                  {current.receiptNo && (
                    <div className="mt-2 text-xs text-neutral-500">
                      Assigned receipt no.:{" "}
                      <span className="font-mono">{current.receiptNo}</span>
                    </div>
                  )}
                </div>
              </div>
            )}
            {tab === "overview" && (
              <div>
                <div className="flex items-center justify-between mb-2">
                  <h2 className="font-semibold">Closed Orders Overview</h2>
                  <div className="flex gap-2">
                    <button
                      onClick={exportExcel}
                      className="px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium"
                    >
                      Export Excel
                    </button>
                    <button
                      onClick={resetOverview}
                      className={confirmingReset
                        ? "min-w-[5.5rem] px-3 py-1.5 rounded-lg bg-red-600 text-white text-sm font-medium shadow-sm"
                        : "min-w-[5.5rem] px-3 py-1.5 rounded-lg border-2 border-red-400 text-red-600 hover:bg-red-50 text-sm font-medium"
                      }
                    >
                      {confirmingReset ? "Confirm?" : "Reset"}
                    </button>
                  </div>
                </div>
                {overview.length === 0 ? (
                  <div className="text-neutral-500">No closed orders yet.</div>
                ) : (
                  <ul className="space-y-2">
                    {overview.map((order, idx) => (
                      <li key={idx} className="border border-neutral-200 rounded-xl p-3 bg-white shadow-sm">
                        <div className="font-medium flex items-center gap-2 flex-wrap">
                          <span>
                            Table {order.table},{" "}
                            {new Date(order.timestamp).toLocaleString()}
                          </span>
                          {order.cashPaid && (
                            <span className="text-green-600 font-bold">
                              [CASH]
                            </span>
                          )}
                          {order.receiptNo && (
                            <span className="text-xs text-neutral-500">
                              #{order.receiptNo}
                            </span>
                          )}
                          <button
                            onClick={() => downloadVatTicketFromOverview(idx)}
                            className="text-sm px-2.5 py-1 rounded-lg bg-neutral-800 hover:bg-neutral-700 text-white font-medium"
                          >
                            Download VAT Ticket (PDF)
                          </button>
                        </div>
                        <div className="text-sm text-neutral-600">
                          Total: {eur(roundToCents(order.totals.total))} (VAT:{" "}
                          {eur(roundToCents(order.totals.tax))})
                        </div>
                        {order.comment && (
                          <div className="text-sm text-neutral-500 mt-1">
                            Comment: {order.comment}
                          </div>
                        )}
                      </li>
                    ))}
                  </ul>
                )}
                <div className="mt-4 bg-neutral-800 text-white rounded-xl px-4 py-3 font-semibold text-lg flex justify-between">
                  <span>Grand Total</span>
                  <span>{eur(roundToCents(grandTotal))}</span>
                </div>
              </div>
            )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
