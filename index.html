      function SwipeableItem({ onSwipe, children }) {
        const startX = useRef(0);
        const currentX = useRef(0);
        const swiping = useRef(false);
        const elRef = useRef(null);
        const THRESHOLD = 80;

        const onTouchStart = useCallback((e) => {
          startX.current = e.touches[0].clientX;
          currentX.current = startX.current;
          swiping.current = true;
        }, []);

        const onTouchMove = useCallback((e) => {
          if (!swiping.current) return;
          currentX.current = e.touches[0].clientX;
          const dx = currentX.current - startX.current;
          if (dx < 0 && elRef.current) {
            elRef.current.style.transform = `translateX(${Math.max(dx, -120)}px)`;
            elRef.current.style.opacity = Math.max(1 + dx / 200, 0.4);
          }
        }, []);

        const onTouchEnd = useCallback(() => {
          if (!swiping.current) return;
          swiping.current = false;
          const dx = currentX.current - startX.current;
          if (dx < -THRESHOLD) {
            if (elRef.current) {
              elRef.current.style.transform = "translateX(-100%)";
              elRef.current.style.opacity = "0";
            }
            setTimeout(onSwipe, 150);
          } else if (elRef.current) {
            elRef.current.style.transform = "";
            elRef.current.style.opacity = "";
          }
        }, [onSwipe]);

        return (
          <div
            ref={elRef}
            onTouchStart={onTouchStart}
            onTouchMove={onTouchMove}
            onTouchEnd={onTouchEnd}
            style={{ transition: "transform 0.15s ease, opacity 0.15s ease" }}
          >
            {children}
          </div>
        );
      }

      // --- VAT breakdown helper ---
      function computeVatBreakdown(items, discountFactor = 1) {
        const summary = {};
        const lines = items.map((item) => {
          const gross = item.price * item.qty;
          const net = gross / (1 + item.vat);
          const vatAmt = gross - net;
          const rate = item.vat;
          if (!summary[rate]) summary[rate] = { net: 0, vat: 0, gross: 0 };
          summary[rate].net += net * discountFactor;
          summary[rate].vat += vatAmt * discountFactor;
          summary[rate].gross += gross * discountFactor;
          return {
            name: item.name,
            qty: item.qty,
            unitGross: item.price,
            vatRate: item.vat,
            lineNet: net,
            lineVat: vatAmt,
            lineGross: gross,
          };
        });
        Object.keys(summary).forEach((rate) => {
          summary[rate].net = roundToCents(summary[rate].net);
          summary[rate].vat = roundToCents(summary[rate].vat);
          summary[rate].gross = roundToCents(summary[rate].gross);
        });
        return { lines, summary };
      }

      // --- PDF generator ---
      function downloadVatTicketPDF(ticket, opts = { format: "receipt" }) {
        const result = buildVatTicketDoc(ticket, opts);
        if (!result) {
          alert("PDF engine (jsPDF) failed to load.");
          return;
        }
        try {
          result.doc.save(result.fileName);
        } catch (e) {
          alert(
            "Unable to download PDF. If you are in an in-app browser, try opening in Chrome/Edge/Safari.",
          );
        }
      }

      function buildVatTicketDoc(ticket, opts = { format: "receipt" }) {
        const jsPDFCtor = getJsPDFCtor();
        if (!jsPDFCtor) return null;
        const fmt = (n) => {
          const v = roundToCents(n).toFixed(2);
          const [int, dec] = v.split(".");
          const intFmt = int.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
          return intFmt + "." + dec;
        };
        const isReceipt = opts.format !== "a4";
        // Estimate receipt height: header(30) + meta(12) + items(6 per line + 8 header) + totals(15) + vat(20) + footer(15) + margin(10)
        const itemCount = ticket.lines ? ticket.lines.length : 0;
        const vatRateCount = ticket.vatSummary
          ? Object.keys(ticket.vatSummary).length
          : 1;
        const estimatedHeight = isReceipt
          ? Math.max(120, 75 + itemCount * 6 + vatRateCount * 6 + 30)
          : undefined;
        const doc = new jsPDFCtor({
          unit: "mm",
          format: isReceipt ? [80, estimatedHeight] : "a4",
        });
        const pageWidth = doc.internal.pageSize.getWidth();
        const marginX = 4;
        let y = 8;
        doc.setFontSize(13);
        doc.text(ticket.business.name || "Business", marginX, y);
        y += 5;
        doc.setFontSize(9);
        if (ticket.business.address) {
          doc.text(ticket.business.address, marginX, y);
          y += 4;
        }
        if (ticket.business.vatNumber) {
          doc.text(`VAT: ${ticket.business.vatNumber}`, marginX, y);
          y += 5;
        }
        doc.setDrawColor(150);
        doc.line(marginX, y, pageWidth - marginX, y);
        y += 3;
        doc.setFontSize(9);
        if (ticket.receiptNo) {
          doc.text(`Receipt: ${ticket.receiptNo}`, marginX, y);
          y += 4;
        }
        doc.text(
          `Date: ${new Date(ticket.timestamp).toLocaleString()}`,
          marginX,
          y,
        );
        y += 4;
        doc.text(`Table: ${ticket.table}`, marginX, y);
        y += 2;
        const itemsBody = ticket.lines.map((line) => [
          `${line.qty} × ${line.name}`,
          fmt(line.unitGross),
          `${(line.vatRate * 100).toFixed(0)}%`,
          fmt(line.lineGross),
        ]);
        if (typeof doc.autoTable === "function") {
          doc.autoTable({
            startY: y,
            margin: { left: marginX, right: marginX },
            tableWidth: pageWidth - marginX * 2,
            head: [["Item", "Unit € (incl.)", "VAT", "Total €"]],
            body: itemsBody,
            theme: "plain",
            styles: { fontSize: 8, cellPadding: 1, overflow: "linebreak" },
            headStyles: { fillColor: [245, 245, 245] },
            columnStyles: {
              0: { cellWidth: "auto" },
              1: { halign: "right", cellWidth: 16 },
              2: { halign: "right", cellWidth: 10 },
              3: { halign: "right", cellWidth: 16 },
            },
          });
          y = doc.lastAutoTable.finalY + 2;
          doc.line(marginX, y, pageWidth - marginX, y);
          y += 2;
        }
        if (typeof doc.autoTable === "function") {
          const totalsBody = [];
          if (ticket.discount && ticket.discountAmount) {
            totalsBody.push([
              `Discount (${ticket.discount}%)`,
              `-${fmt(ticket.discountAmount)} €`,
            ]);
          }
          totalsBody.push([
            "Subtotal (excl. VAT)",
            fmt(ticket.totals.subtotal) + " €",
          ]);
          totalsBody.push(["VAT total", fmt(ticket.totals.tax) + " €"]);
          totalsBody.push([
            { content: "Total (incl. VAT)", styles: { fontStyle: "bold" } },
            {
              content: fmt(ticket.totals.total) + " €",
              styles: { fontStyle: "bold", halign: "right" },
            },
          ]);
          doc.autoTable({
            startY: y,
            theme: "plain",
            margin: { left: marginX, right: marginX },
            tableWidth: pageWidth - marginX * 2,
            styles: {
              fontSize: 9,
              cellPadding: { top: 0.5, bottom: 0.5, left: 1, right: 1 },
              overflow: "linebreak",
            },
            body: totalsBody,
            columnStyles: {
              0: { cellWidth: "auto" },
              1: { halign: "right", cellWidth: 20 },
            },
          });
          y = doc.lastAutoTable.finalY + 3;
        }
        const vatRows = Object.keys(ticket.vatSummary)
          .sort()
          .map((rate) => {
            const entry = ticket.vatSummary[rate];
            return [
              `${(parseFloat(rate) * 100).toFixed(0)}%`,
              fmt(entry.net),
              fmt(entry.vat),
              fmt(entry.gross),
            ];
          });
        if (typeof doc.autoTable === "function") {
          doc.setFontSize(9);
          doc.text("VAT breakdown", marginX, y);
          y += 1;
          doc.autoTable({
            startY: y,
            margin: { left: marginX, right: marginX },
            tableWidth: pageWidth - marginX * 2,
            head: [["Rate", "Net €", "VAT €", "Gross €"]],
            body: vatRows,
            theme: "plain",
            styles: { fontSize: 8, cellPadding: 1, overflow: "linebreak" },
            headStyles: { fillColor: [245, 245, 245] },
            columnStyles: {
              0: { cellWidth: "auto" },
              1: { halign: "right", cellWidth: 18 },
              2: { halign: "right", cellWidth: 16 },
              3: { halign: "right", cellWidth: 18 },
            },
          });
          y = doc.lastAutoTable.finalY + 3;
        }
        doc.setFontSize(9);
        doc.text(`Payment: ${ticket.paymentMethod}`, marginX, y);
        y += 4;
        if (ticket.comment) {
          doc.setTextColor(90);
          doc.text(`Comment: ${ticket.comment}`, marginX, y);
          doc.setTextColor(0);
          y += 4;
        }
        if (ticket.footerNote) {
          doc.setTextColor(90);
          doc.text(ticket.footerNote, marginX, y);
          doc.setTextColor(0);
        }
        const dateLabel = new Date(ticket.timestamp).toLocaleDateString();
        const shareTitle = `${ticket.business.name || "Mistral"} - VAT Ticket - ${dateLabel}`;
        const fileName =
          shareTitle.replace(/[^a-zA-Z0-9 \-]/g, "").replace(/\s+/g, "_") +
          ".pdf";
        return { doc, fileName, shareTitle };
      }

      function shareVatTicketPDF(ticket, opts = { format: "receipt" }) {
        const result = buildVatTicketDoc(ticket, opts);
        if (!result) {
          alert("PDF engine (jsPDF) failed to load.");
          return;
        }
        const blob = result.doc.output("blob");
        const file = new File([blob], result.fileName, {
          type: "application/pdf",
        });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          navigator
            .share({ files: [file], title: result.shareTitle })
            .catch(() => {});
        } else {
          result.doc.save(result.fileName);
        }
      }

      // --- GitHub OAuth + Publish ---
      function getGitHubToken() {
        try {
          return localStorage.getItem("github_token") || null;
        } catch {
          return null;
        }
      }

      function setGitHubToken(token) {
        try {
          localStorage.setItem("github_token", token);
        } catch {}
      }

      function startGitHubAuth() {
        return new Promise((resolve, reject) => {
          if (!GITHUB_CLIENT_ID || !GITHUB_OAUTH_PROXY) {
            reject(new Error("GitHub OAuth not configured."));
            return;
          }
          const callbackUrl = GITHUB_OAUTH_PROXY + "/callback";
          const authUrl =
            "https://github.com/login/oauth/authorize" +
            "?client_id=" +
            encodeURIComponent(GITHUB_CLIENT_ID) +
            "&scope=public_repo" +
            "&redirect_uri=" +
            encodeURIComponent(callbackUrl);
          const popup = window.open(
            authUrl,
            "github_auth",
            "width=600,height=700",
          );
          if (!popup) {
            reject(new Error("Popup blocked. Please allow popups."));
            return;
          }
          function onMessage(event) {
            if (event.data && event.data.access_token) {
              window.removeEventListener("message", onMessage);
              setGitHubToken(event.data.access_token);
              resolve(event.data.access_token);
            } else if (event.data && event.data.error) {
              window.removeEventListener("message", onMessage);
              reject(
                new Error(event.data.error_description || event.data.error),
              );
            }
          }
          window.addEventListener("message", onMessage);
          const interval = setInterval(() => {
            try {
              if (popup.closed) {
                clearInterval(interval);
                window.removeEventListener("message", onMessage);
                if (!getGitHubToken()) {
                  reject(new Error("Auth cancelled."));
                }
              }
            } catch {}
          }, 500);
        });
      }

      async function publishMenuToGitHub(menuItems) {
        let token = getGitHubToken();
        if (!token) {
          token = await startGitHubAuth();
        }
        const headers = {
          Authorization: "Bearer " + token,
          Accept: "application/vnd.github.v3+json",
        };
        const wb = XLSX.utils.book_new();
        const rows = menuItems.map((item) => ({
          id: item.id,
          name: item.name,
          category: item.category,
          price: item.price,
          vat: item.vat,
        }));
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.json_to_sheet(rows),
          "Menu",
        );
        const xlsxData = XLSX.write(wb, { type: "base64", bookType: "xlsx" });
        let sha = null;
        try {
          const existing = await fetch(
            "https://api.github.com/repos/" +
              GITHUB_REPO +
              "/contents/" +
              GITHUB_MENU_PATH +
              "?ref=main",
            { headers },
          );
          if (existing.ok) {
            const data = await existing.json();
            sha = data.sha;
          }
        } catch {}
        const putResp = await fetch(
          "https://api.github.com/repos/" +
            GITHUB_REPO +
            "/contents/" +
            GITHUB_MENU_PATH,
          {
            method: "PUT",
            headers,
            body: JSON.stringify({
              message: "📋 Update menu",
              content: xlsxData,
              sha: sha || undefined,
              branch: "main",
            }),
          },
        );
        if (!putResp.ok) {
          const err = await putResp.json().catch(() => ({}));
          if (putResp.status === 401) {
            localStorage.removeItem("github_token");
            throw new Error("GitHub token expired. Please try again.");
          }
          throw new Error(err.message || "Failed to publish menu.");
        }
        return true;
      }

      function App() {
        const [menu, setMenu] = useLocalStorage("pos_menu", DEFAULT_MENU);
        const [orders, setOrders] = useLocalStorage("orders", {});
        const [overview, setOverview] = useLocalStorage("overview", []);
        const [selectedTable, setSelectedTable] = useState(TABLES[0]);
        const [tab, setTab] = useState("orders");
        const [category, setCategory] = useState("All");
        const [searchQuery, setSearchQuery] = useState("");
        const [settings, setSettings] = useLocalStorage(
          "pos_settings",
          DEFAULT_SETTINGS,
        );
        const [showSettings, setShowSettings] = useState(false);
        const [confirmingClear, setConfirmingClear] = useState(false);
        const [confirmingReset, setConfirmingReset] = useState(false);
        const [diag, setDiag] = useState(getLibDiag());
        const [darkMode, setDarkMode] = useLocalStorage("pos_dark_mode", false);
        const [editingMenu, setEditingMenu] = useState(false);
        const [publishing, setPublishing] = useState(false);
        const [editDraft, setEditDraft] = useState(null);
        const fileInputRef = useRef(null);
        const [qrDataUrl, setQrDataUrl] = useState(null);

        useEffect(() => {
          const timeout = setTimeout(() => setDiag(getLibDiag()), 800);
          return () => clearTimeout(timeout);
        }, []);

        useEffect(() => {
          document.documentElement.classList.toggle("dark", darkMode);
        }, [darkMode]);

        useEffect(() => {
          setQrDataUrl(null);
        }, [selectedTable]);

        useEffect(() => {
          const doBackup = () => {
            try {
              const backup = JSON.stringify({
                orders,
                overview,
                menu,
                settings,
                exportedAt: new Date().toISOString(),
              });
              localStorage.setItem("pos_auto_backup", backup);
            } catch {}
          };
          const interval = setInterval(doBackup, 300000);
          return () => clearInterval(interval);
        }, [orders, overview, menu, settings]);

        const emptyTable = {
          items: [],
          cashPaid: true,
          comment: "",
          receiptNo: null,
          tip: 0,
        };
        const current = orders[selectedTable] || emptyTable;

        const totals = useMemo(() => {
          const items = (orders[selectedTable] || emptyTable).items;
          const gross = items.reduce(
            (sum, item) => sum + item.price * item.qty,
            0,
          );
          const net = items.reduce(
            (sum, item) => sum + (item.price * item.qty) / (1 + item.vat),
            0,
          );
          return { subtotal: net, tax: gross - net, total: gross };
        }, [orders, selectedTable]);

        function cloneTableState(prev) {
          const existing = prev[selectedTable] || emptyTable;
          return {
            ...existing,
            items: existing.items.map((item) => ({ ...item })),
          };
        }

        function addItemByIndex(idx) {
          const menuItem = menu[idx];
          const key = menuItem.id || String(idx);
          let newItem = { ...menuItem };
          if (menuItem.id === "custom_food" || menuItem.id === "custom_drink") {
            const name =
              prompt("Enter item name:", menuItem.name) || menuItem.name;
            const price = parseFloat(prompt("Enter price (EUR):", "0"));
            if (isNaN(price) || price <= 0) return;
            const vatInput = prompt(
              "Enter VAT rate (e.g. 0.12 for 12%, 0.21 for 21%):",
              menuItem.vat,
            );
            const vat = parseFloat(vatInput);
            if (isNaN(vat) || vat < 0) return;
            newItem = { ...menuItem, name, price, vat };
          }
          setOrders((prev) => {
            const table = cloneTableState(prev);
            if (menuItem.id && menuItem.id.startsWith("custom_")) {
              const uniqueKey = key + "_" + Date.now();
              table.items.push({ ...newItem, qty: 1, key: uniqueKey });
            } else {
              const existing = table.items.find((item) => item.key === key);
              if (existing) existing.qty += 1;
              else table.items.push({ ...newItem, qty: 1, key });
            }
            return { ...prev, [selectedTable]: table };
          });
        }

        function changeQty(key, delta) {
          setOrders((prev) => {
            const table = cloneTableState(prev);
            const existing = table.items.find((item) => item.key === key);
            if (!existing) return prev;
            existing.qty += delta;
            if (existing.qty <= 0)
              table.items = table.items.filter((item) => item.key !== key);
            return { ...prev, [selectedTable]: table };
          });
        }

        function removeItem(key) {
          setOrders((prev) => {
            const table = cloneTableState(prev);
            table.items = table.items.filter((item) => item.key !== key);
            return { ...prev, [selectedTable]: table };
          });
        }

        function setCashPaidForCurrent(val) {
          setOrders((prev) => {
            const table = cloneTableState(prev);
            table.cashPaid = val;
            return { ...prev, [selectedTable]: table };
          });
        }

        function setTipForCurrent(val) {
          setOrders((prev) => {
            const table = cloneTableState(prev);
            table.tip = val;
            return { ...prev, [selectedTable]: table };
          });
        }

        function clearCurrentTable() {
          if (!confirmingClear) {
            setConfirmingClear(true);
            setTimeout(() => setConfirmingClear(false), 3000);
            return;
          }
          setConfirmingClear(false);
          setOrders((prev) => ({
            ...prev,
            [selectedTable]: { ...emptyTable },
          }));
        }

        function closeOrder() {
          const tableOrder = orders[selectedTable] || emptyTable;
          if (!tableOrder.items.length) return;
          const discountFactor = tableOrder.thomasDiscount ? 0.9 : 1;
          const rawGross = tableOrder.items.reduce(
            (sum, item) => sum + item.price * item.qty,
            0,
          );
          const gross = rawGross * discountFactor;
          const net =
            tableOrder.items.reduce(
              (sum, item) => sum + (item.price * item.qty) / (1 + item.vat),
              0,
            ) * discountFactor;
          const discountAmount = roundToCents(rawGross - gross);
          const totalsSnapshot = {
            subtotal: roundToCents(net),
            tax: roundToCents(gross - net),
            total: roundToCents(gross),
          };
          setOverview((prev) => [
            ...prev,
            {
              table: selectedTable,
              items: tableOrder.items.map((item) => ({ ...item })),
              totals: totalsSnapshot,
              timestamp: new Date().toISOString(),
              cashPaid: tableOrder.cashPaid,
              comment: tableOrder.comment || "",
              receiptNo: tableOrder.receiptNo || null,
              tip: tableOrder.tip || 0,
              thomasDiscount: tableOrder.thomasDiscount || false,
              discountAmount,
            },
          ]);
          setOrders((prev) => ({
            ...prev,
            [selectedTable]: { ...emptyTable },
          }));
        }

        function exportExcel() {
          if (!window.XLSX) {
            alert(
              "XLSX library not loaded. Please check your internet connection.",
            );
            return;
          }
          const overviewRows = overview.map((order, idx) => ({
            Index: idx + 1,
            Table: order.table,
            Timestamp: order.timestamp,
            CashPaid: order.cashPaid,
            Discount: order.thomasDiscount || false,
            Tip_EUR: roundToCents(order.tip || 0),
            Comment: order.comment || "",
            ReceiptNo: order.receiptNo || "",
            SubtotalNet_EUR: roundToCents(order.totals.subtotal),
            VAT_EUR: roundToCents(order.totals.tax),
            TotalGross_EUR: roundToCents(order.totals.total),
          }));
          const lineRows = [];
          overview.forEach((order, idx) => {
            const df = order.thomasDiscount ? 0.9 : 1;
            (order.items || []).forEach((item) => {
              const gross = item.price * item.qty * df;
              const net = gross / (1 + item.vat);
              const vatAmt = gross - net;
              lineRows.push({
                OverviewIndex: idx + 1,
                Table: order.table,
                Timestamp: order.timestamp,
                CashPaid: order.cashPaid,
                Discount: order.thomasDiscount || false,
                ReceiptNo: order.receiptNo || "",
                ItemName: item.name,
                Qty: item.qty,
                UnitPriceGross_EUR: roundToCents(item.price * df),
                VAT_Rate: item.vat,
                LineNet_EUR: roundToCents(net),
                LineVAT_EUR: roundToCents(vatAmt),
                LineGross_EUR: roundToCents(gross),
              });
            });
          });
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(
            wb,
            XLSX.utils.json_to_sheet(overviewRows),
            "Overview",
          );
          XLSX.utils.book_append_sheet(
            wb,
            XLSX.utils.json_to_sheet(lineRows),
            "LineItems",
          );
          XLSX.writeFile(wb, "POS_Export.xlsx");
        }

        function resetOverview() {
          if (!confirmingReset) {
            setConfirmingReset(true);
            setTimeout(() => setConfirmingReset(false), 3000);
            return;
          }
          setConfirmingReset(false);
          setOverview([]);
        }

        function reopenOrder(index) {
          const order = overview[index];
          if (!order) return;
          const existing = orders[order.table];
          if (existing && existing.items && existing.items.length > 0) {
            if (
              !confirm(
                `Table ${order.table} already has ${existing.items.length} items. Replace current order?`,
              )
            )
              return;
          }
          setOrders((prev) => ({
            ...prev,
            [order.table]: {
              items: order.items.map((item) => ({ ...item })),
              cashPaid: order.cashPaid,
              thomasDiscount: order.thomasDiscount || false,
              comment: order.comment || "",
              receiptNo: order.receiptNo || null,
              tip: order.tip || 0,
            },
          }));
          setOverview((prev) => prev.filter((_, i) => i !== index));
          setSelectedTable(order.table);
          setTab("orders");
        }

        const grandTotal = overview.reduce((sum, order) => {
          return sum + (order?.totals?.total || 0);
        }, 0);

        const pendingTotal = Object.values(orders).reduce((sum, table) => {
          if (!table || !table.items) return sum;
          const gross = table.items.reduce(
            (s, item) => s + item.price * item.qty,
            0,
          );
          return sum + (table.thomasDiscount ? gross * 0.9 : gross);
        }, 0);

        useEffect(() => {
          const allTotal = roundToCents(grandTotal + pendingTotal);
          const rounded = Math.round(allTotal);
          document.title =
            rounded > 0 ? `Mistral POS | €${rounded}` : "Mistral POS";
        }, [grandTotal, pendingTotal]);

        const filteredMenu = menu.filter((item) => {

          return true;

            receiptNo = formatReceiptNo(prev.receiptPrefix || "", num);
            return { ...prev, nextReceiptNumber: num + 1 };

              setEditingMenu(false);

                        <span className="w-8"></span>
                      </div>
                      {(editDraft || []).map((item, i) => (
                        <div
                          key={i}
                          className="flex gap-2 items-center bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-xl p-2"
                        >
                          <input
                            value={item.name}
                            onChange={(e) =>
                              updateDraftItem(i, "name", e.target.value)
                            }
                            placeholder="Name"
                            className="flex-1 px-2 py-1 border rounded text-sm dark:bg-neutral-700 dark:border-neutral-600"
                          />
                          <select
                            value={item.category}
                            onChange={(e) =>
                              updateDraftItem(i, "category", e.target.value)
                            }
                            className="px-2 py-1 border rounded text-sm dark:bg-neutral-700 dark:border-neutral-600"
                          >
                            <option value="Food">Food</option>
                            <option value="Drinks">Drinks</option>
                          </select>
                          <input
                            type="number"
                            value={item.price}
                            onChange={(e) =>
                              updateDraftItem(
                                i,
                                "price",
                                parseFloat(e.target.value) || 0,
                              )
                            }
                            placeholder="Price"
                            className="w-20 px-2 py-1 border rounded text-sm dark:bg-neutral-700 dark:border-neutral-600"
                            step="0.5"
                            min="0"
                          />
                          <input
                            type="number"
                            value={item.vat}
                            onChange={(e) =>
                              updateDraftItem(
                                i,
                                "vat",
                                parseFloat(e.target.value) || 0,
                              )
                            }
                            placeholder="VAT"
                            className="w-16 px-2 py-1 border rounded text-sm dark:bg-neutral-700 dark:border-neutral-600"
                            step="0.01"
                            min="0"
                            max="1"
                          />
                          <button
                            onClick={() => removeDraftItem(i)}
                            className="w-8 h-8 flex items-center justify-center rounded-lg bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/50 text-red-500"
                          >
                            ✕
                          </button>
                        </div>
                      ))}
                      <button
                        onClick={addDraftItem}
                        className="w-full py-2 border-2 border-dashed border-neutral-300 dark:border-neutral-600 rounded-xl text-neutral-500 hover:border-neutral-400 hover:text-neutral-600 text-sm"
                      >
                        + Add Item
                      </button>
                    </div>
                  ) : (
                    <div className="space-y-1">
                      <div className="grid grid-cols-[1fr_auto_auto_auto] gap-2 px-3 py-1 text-xs font-medium text-neutral-500 dark:text-neutral-400 uppercase tracking-wide">
                        <span>Name</span>
                        <span className="w-20 text-right">Price</span>
                        <span className="w-16 text-right">VAT</span>
                        <span className="w-16 text-right">Category</span>
                      </div>
                      {menu.map((item) => (
                        <div
                          key={item.id}
                          className="grid grid-cols-[1fr_auto_auto_auto] gap-2 items-center px-3 py-2 rounded-lg border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-800"
                          style={{
                            borderLeftWidth: "4px",
                            borderLeftColor:
                              item.category === "Food" ? "#10b981" : "#0ea5e9",
                          }}
                        >
                          <span className="font-medium">{item.name}</span>
                          <span className="w-20 text-right text-sm">
                            {eur(item.price)}
                          </span>
                          <span className="w-16 text-right text-sm text-neutral-500 dark:text-neutral-400">
                            {(item.vat * 100).toFixed(0)}%
                          </span>
                          <span className="w-16 text-right text-xs text-neutral-500 dark:text-neutral-400">
                            {item.category}
                          </span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="mt-3 text-xs text-neutral-500 dark:text-neutral-400">
                    {menu.length} items (
                    {menu.filter((i) => i.category === "Food").length} food,{" "}
                    {menu.filter((i) => i.category === "Drinks").length} drinks)
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
