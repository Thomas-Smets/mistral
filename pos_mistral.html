 // --- VAT breakdown helper --- 
 function computeVatBreakdown(items) { 
 const summary = {}; // { rate: { net, vat, gross } } 
 const lines = items.map(it => { 
 const gross = it.price * it.qty; 
 const net = gross / (1 + it.vat); 
 const vatAmt = gross - net; 
 const rate = it.vat; 
 if (!summary[rate]) summary[rate] = { net: 0, vat: 0, gross: 0 }; 
 summary[rate].net += net; summary[rate].vat += vatAmt; summary[rate].gross += gross; 
 return { name: it.name, qty: it.qty, unitGross: it.price, vatRate: it.vat, lineNet: net, lineVat: vatAmt, lineGross: gross }; 
 }); 
 Object.keys(summary).forEach(r => { summary[r].net = round2(summary[r].net); summary[r].vat = round2(summary[r].vat); summary[r].gross = round2(summary[r].gross); }); 
 return { lines, summary }; 
 } 
 // --- PDF generator (robust jsPDF detection) --- 
 function downloadVatTicketPDF(ticket, opts = { format: 'receipt' }) { 
 const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF || window.jspPDF; 
 if (!jsPDFCtor) { 
 alert('PDF engine (jsPDF) failed to load. Please check your internet connection or allow CDN scripts.'); 
 return; 
 } 
 const fmt = n => new Intl.NumberFormat(undefined, { style: 'currency', currency: 'EUR' }).format(round2(n)); 
 const doc = new jsPDFCtor({ unit: 'mm', format: opts.format === 'a4' ? 'a4' : [80, 200] }); 
 if (typeof doc.autoTable !== 'function') { 
 alert('jsPDF AutoTable plugin not loaded. PDF will not include tables. Please ensure CDN access.'); 
 } 
 const pageWidth = doc.internal.pageSize.getWidth(); 
 const marginX = 5; 
 let y = 8; 
 // Header 
 doc.setFontSize(13); 
 doc.text(ticket.business.name || 'Business', marginX, y); y += 5; 
 doc.setFontSize(9); 
 if (ticket.business.address) { doc.text(ticket.business.address, marginX, y); y += 4; } 
 if (ticket.business.vatNumber) { doc.text(`VAT: ${ticket.business.vatNumber}`, marginX, y); y += 5; } 
 doc.setDrawColor(150); doc.line(marginX, y, pageWidth - marginX, y); y += 3; 
 // Meta 
 doc.setFontSize(9); 
 if (ticket.receiptNo) { doc.text(`Receipt: ${ticket.receiptNo}`, marginX, y); y += 4; } 
 doc.text(`Date: ${new Date(ticket.timestamp).toLocaleString()}`, marginX, y); y += 4; 
 doc.text(`Table: ${ticket.table}`, marginX, y); y += 2; 
 // Items 
 const itemsBody = ticket.lines.map(l => [ `${l.qty} × ${l.name}`, fmt(l.unitGross), `${(l.vatRate * 100).toFixed(0)}%`, fmt(l.lineGross) ]); 
 if (typeof doc.autoTable === 'function') { 
 doc.autoTable({ startY: y, head: [['Item', 'Unit (incl.)', 'VAT', 'Total']], body: itemsBody, theme: 'plain', styles: { fontSize: 8, cellPadding: 1 }, headStyles: { fillColor: [245,245,245] }, columnStyles: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' } } }); 
 y = doc.lastAutoTable.finalY + 2; 
 doc.line(marginX, y, pageWidth - marginX, y); y += 2; 
 } else { 
 // Basic fallback when autotable missing 
 doc.text('Items:', marginX, y); y += 4; 
 itemsBody.forEach(row => { doc.text(`${row[0]}  ${row[1]}  ${row[2]}  ${row[3]}`, marginX, y); y += 4; }); 
 y += 2; 
 } 
 // Totals 
 if (typeof doc.autoTable === 'function') { 
 doc.autoTable({ startY: y, theme: 'plain', styles: { fontSize: 9, cellPadding: { top: 0.5, bottom: 0.5 } }, body: [ ['Subtotal (excl. VAT)', fmt(ticket.totals.subtotal)], ['VAT total', fmt(ticket.totals.tax)], [{ content: 'Total (incl. VAT)', styles: { fontStyle: 'bold' } }, { content: fmt(ticket.totals.total), styles: { fontStyle: 'bold', halign: 'right' } }] ], columnStyles: { 0: { cellWidth: pageWidth - marginX * 2 - 34 }, 1: { halign: 'right', cellWidth: 34 } } }); 
 y = doc.lastAutoTable.finalY + 3; 
 } else { 
 doc.text(`Subtotal (excl. VAT): ${fmt(ticket.totals.subtotal)}`, marginX, y); y += 4; 
 doc.text(`VAT total: ${fmt(ticket.totals.tax)}`, marginX, y); y += 4; 
 doc.text(`Total (incl. VAT): ${fmt(ticket.totals.total)}`, marginX, y); y += 6; 
 } 
 // VAT breakdown 
 const vatRows = Object.keys(ticket.vatSummary).sort().map(rate => { const s = ticket.vatSummary[rate]; return [`${(parseFloat(rate) * 100).toFixed(0)}%`, fmt(s.net), fmt(s.vat), fmt(s.gross)]; }); 
 if (typeof doc.autoTable === 'function') { 
 doc.setFontSize(9); doc.text('VAT breakdown', marginX, y); y += 1; 
 doc.autoTable({ startY: y, head: [['Rate', 'Net', 'VAT', 'Gross']], body: vatRows, theme: 'plain', styles: { fontSize: 8, cellPadding: 1 }, headStyles: { fillColor: [245,245,245] }, columnStyles: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' } } }); 
 y = doc.lastAutoTable.finalY + 3; 
 } 
 // Payment + comment + footer 
 doc.setFontSize(9); 
 doc.text(`Payment: ${ticket.paymentMethod}`, marginX, y); y += 4; 
 if (ticket.comment) { doc.setTextColor(90); doc.text(`Comment: ${ticket.comment}`, marginX, y); doc.setTextColor(0); y += 4; } 
 if (ticket.footerNote) { doc.setTextColor(90); doc.text(ticket.footerNote, marginX, y); doc.setTextColor(0); } 
 const fileName = (ticket.receiptNo ? `${ticket.receiptNo}.pdf` : `Receipt_${new Date(ticket.timestamp).toISOString()}.pdf`).replace(/[:]/g, '-'); 
 try { doc.save(fileName); } catch(e) { alert('Unable to download PDF. If you are in an in-app browser, try opening in Chrome/Edge/Safari.'); } 
 } 
 function App() { 
 const menu = DEFAULT_MENU; 
 const [orders, setOrders] = useLocalStorage("orders", {}); 
 const [overview, setOverview] = useLocalStorage("overview", []); 
 const [selectedTable, setSelectedTable] = useState(TABLES[0]); 
 const [tab, setTab] = useState("orders"); 
 const [category, setCategory] = useState("All"); 
 // Settings state (Mistral defaults) 
 const [settings, setSettings] = useLocalStorage('pos_settings', DEFAULT_SETTINGS); 
 const [showSettings, setShowSettings] = useState(false); 
 const [diag, setDiag] = useState(getLibDiag()); 
 useEffect(() => { 
 // Refresh diagnostics once libs finish loading 
 const t = setTimeout(() => setDiag(getLibDiag()), 800); 
 return () => clearTimeout(t); 
 }, []); 
 const current = orders[selectedTable] || { items: [], cashPaid: false, comment: "", receiptNo: null }; 
 const totals = useMemo(() => { 
 const gross = current.items.reduce((s, it) => s + it.price * it.qty, 0); 
 const net = current.items.reduce((s, it) => s + (it.price * it.qty) / (1 + it.vat), 0); 
 const tax = gross - net; 
 return { subtotal: net, tax, total: gross }; 
 }, [current]); 
 function ensureTableState(prev) { 
 const table = { items: [], cashPaid: false, comment: "", receiptNo: null, ...(prev[selectedTable] || {}) }; 
 return table; 
 } 
 function addItemByIndex(idx) { 
 const it = menu[idx]; 
 const key = it.id || String(idx); 
 let newItem = { ...it }; 
 if (it.id === 'custom_food' || it.id === 'custom_drink') { 
 const name = prompt('Enter item name:', it.name) || it.name; 
 const price = parseFloat(prompt('Enter price (EUR):', '0')); 
 if (isNaN(price) || price <= 0) return; 
 const vatInput = prompt('Enter VAT rate (e.g. 0.12 for 12%, 0.21 for 21%):', it.vat); 
 const vat = parseFloat(vatInput); 
 if (isNaN(vat) || vat < 0) return; 
 newItem = { ...it, name, price, vat }; 
 } 
 setOrders(prev => { 
 const table = ensureTableState(prev); 
 if (it.id && it.id.startsWith('custom_')) { 
 const uniqueKey = key + '_' + Date.now(); 
 table.items.push({ ...newItem, qty: 1, key: uniqueKey }); 
 } else { 
 const ex = table.items.find(x => x.key === key); 
 if (ex) ex.qty += 1; else table.items.push({ ...newItem, qty: 1, key }); 
 } 
 return { ...prev, [selectedTable]: table }; 
 }); 
 } 
 function changeQty(key, delta) { 
 setOrders(prev => { 
 const table = ensureTableState(prev); 
 const ex = table.items.find(x => x.key === key); 
 if (!ex) return prev; 
 ex.qty += delta; 
 if (ex.qty <= 0) table.items = table.items.filter(x => x.key !== key); 
 return { ...prev, [selectedTable]: table }; 
 }); 
 } 
 function removeItem(key) { 
 setOrders(prev => { 
 const table = ensureTableState(prev); 
 table.items = table.items.filter(x => x.key !== key); 
 return { ...prev, [selectedTable]: table }; 
 }); 
 } 
 function setCashPaidForCurrent(val) { 
 setOrders(prev => { 
 const table = ensureTableState(prev); 
 table.cashPaid = val; 
 return { ...prev, [selectedTable]: table }; 
 }); 
 } 
 function clearCurrentTable() { 
 setOrders(prev => ({ ...prev, [selectedTable]: { items: [], cashPaid: false, comment: "", receiptNo: null } })); 
 } 
 function writeOverview() { 
 const t = orders[selectedTable] || { items: [], cashPaid: false, comment: "", receiptNo: null }; 
 if (!t.items.length) return; 
 const gross = t.items.reduce((s, it) => s + it.price * it.qty, 0); 
 const net = t.items.reduce((s, it) => s + (it.price * it.qty) / (1 + it.vat), 0); 
 const tax = gross - net; 
 const totalsSnapshot = { subtotal: net, tax, total: gross }; 
 setOverview(prev => [ ...prev, { table: selectedTable, items: t.items, totals: totalsSnapshot, timestamp: new Date().toISOString(), cashPaid: t.cashPaid, comment: t.comment || "", receiptNo: t.receiptNo || null } ]); 
 clearCurrentTable(); 
 } 
 function exportExcel() { 
 if (!window.XLSX) { alert('XLSX library not loaded. Please check your internet connection.'); return; } 
 const overviewRows = overview.map((o, idx) => ({ Index: idx + 1, Table: o.table, Timestamp: o.timestamp, CashPaid: o.cashPaid, Comment: o.comment || "", ReceiptNo: o.receiptNo || "", SubtotalNet_EUR: round2(o.totals.subtotal), VAT_EUR: round2(o.totals.tax), TotalGross_EUR: round2(o.totals.total) })); 
 const lineRows = []; 
 overview.forEach((o, i) => { (o.items || []).forEach(it => { const gross = it.price * it.qty; const net = gross / (1 + it.vat); const vatAmt = gross - net; lineRows.push({ OverviewIndex: i + 1, Table: o.table, Timestamp: o.timestamp, CashPaid: o.cashPaid, ReceiptNo: o.receiptNo || "", ItemName: it.name, Qty: it.qty, UnitPriceGross_EUR: round2(it.price), VAT_Rate: it.vat, LineNet_EUR: round2(net), LineVAT_EUR: round2(vatAmt), LineGross_EUR: round2(gross) }); }); }); 
 const wb = XLSX.utils.book_new(); 
 XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(overviewRows), 'Overview'); 
 XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lineRows), 'LineItems'); 
 XLSX.writeFile(wb, 'POS_Export.xlsx'); 
 } 
 const resetOverview = () => { setOverview([]); localStorage.removeItem('overview'); }; 
 const grandTotal = overview.reduce((s, o) => s + (o?.totals?.total || 0), 0); 
 const filteredMenu = category === 'All' ? menu : menu.filter(m => m.category === category); 
 function takeNextReceiptNumber() { 
 const num = settings?.nextReceiptNumber ?? 1; 
 const receiptNo = formatReceiptNo(settings.receiptPrefix || '', num); 
 setSettings({ ...settings, nextReceiptNumber: num + 1 }); 
 return receiptNo; 
 } 
 function downloadVatTicketForCurrent() { 
 const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF || window.jspPDF; 
 if (!jsPDFCtor) { alert('PDF engine (jsPDF) not loaded. Open Settings to see diagnostics.'); return; } 
 if (!current.items.length) { alert('No items in the order.'); return; } 
 let receiptNo = current.receiptNo; let assignedNow = false; if (!receiptNo) { receiptNo = takeNextReceiptNumber(); assignedNow = true; } 
 const { lines, summary } = computeVatBreakdown(current.items); 
 const ticket = { business: { name: settings.businessName, address: settings.businessAddress, vatNumber: settings.vatNumber }, receiptNo, timestamp: new Date().toISOString(), table: selectedTable, paymentMethod: current.cashPaid ? 'Cash' : 'Card/Other', comment: current.comment || '', totals, lines, vatSummary: summary, footerNote: settings.footerNote || '' }; 
 downloadVatTicketPDF(ticket, { format: 'receipt' }); 
 if (assignedNow) { setOrders(prev => { const table = ensureTableState(prev); table.receiptNo = receiptNo; return { ...prev, [selectedTable]: table }; }); } 
 } 
 function downloadVatTicketFromOverview(index) { 
 const jsPDFCtor = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF || window.jspPDF; 
 if (!jsPDFCtor) { alert('PDF engine (jsPDF) not loaded. Open Settings to see diagnostics.'); return; } 
 const o = overview[index]; if (!o || !o.items?.length) { alert('No items on this order.'); return; } 
 let assignedNo = o.receiptNo; if (!assignedNo) { assignedNo = takeNextReceiptNumber(); setOverview(prev => { const copy = [...prev]; copy[index] = { ...prev[index], receiptNo: assignedNo }; return copy; }); } 
 const { lines, summary } = computeVatBreakdown(o.items); 
 const ticket = { business: { name: settings.businessName, address: settings.businessAddress, vatNumber: settings.vatNumber }, receiptNo: assignedNo, timestamp: o.timestamp, table: o.table, paymentMethod: o.cashPaid ? 'Cash' : 'Card/Other', comment: o.comment || '', totals: o.totals, lines, vatSummary: summary, footerNote: settings.footerNote || '' }; 
 downloadVatTicketPDF(ticket, { format: 'receipt' }); 
 }

 <h1 className="text-2xl font-bold">Restaurant POS — Mistral</h1> 
 <div className="flex items-center gap-3"> 
 <div className="text-xs text-neutral-600 hidden sm:block">Libs: React {diag.reactOk ? '✓' : '✗'} · Babel {diag.babelOk ? '✓' : '✗'} · XLSX {diag.xlsxOk ? '✓' : '✗'} · jsPDF {diag.jsPdfOk ? '✓' : '✗'} · AutoTable {diag.autoOk ? '✓' : '✗'}</div> 
 <button onClick={() => setShowSettings(true)} className="px-3 py-1 border rounded bg-neutral-200 hover:bg-neutral-300">Settings</button> 
 </div> 
 </div> 
 <Tabs tab={tab} setTab={setTab} /> 
 {showSettings && (<SettingsModal settings={settings} setSettings={setSettings} onClose={() => setShowSettings(false)} />)} 
 {tab === 'orders' && ( 
 <div className="grid grid-cols-1 md:grid-cols-3 gap-4"> 
 {/* MENU */} 
 <div className="md:col-span-2"> 
 <div className="flex items-center justify-between mb-2"> 
 <h2 className="font-semibold">Menu</h2> 
 <div className="flex gap-2"> 
 {['All','Food','Drinks'].map(c => ( 
 <button key={c} onClick={() => setCategory(c)} className={category===c ? 'px-3 py-1 rounded-full border bg-white shadow-sm' : 'px-3 py-1 rounded-full border bg-neutral-200 hover:bg-neutral-300'}>{c}</button> 
 ))} 
 </div> 
 </div> 
 <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2"> 
 {filteredMenu.map((it) => { const idx = menu.findIndex(m => m.id === it.id); return ( 
 <button key={it.id} onClick={() => addItemByIndex(idx)} className="border rounded-lg p-2 text-left bg-white hover:shadow-sm"> 
 <div className="font-medium">{it.name}</div> 
 <div className="text-sm text-neutral-500">{eur(it.price)} (incl. VAT {(it.vat * 100).toFixed(0)}%)</div> 
 </button> 
 ); })} 
 </div> 
 </div> 
 {/* ORDER */} 
 <div> 
 <div className="flex items-center justify-between mb-2"> 
 <h2 className="font-semibold">Table {selectedTable} Order</h2> 
 <select value={selectedTable} onChange={e => setSelectedTable(e.target.value)} className="border rounded px-2 py-1"> 
 {TABLES.map(t => <option key={t} value={t}>Table {t}</option>)} 
 </select> 
 </div> 
 {current.items.length === 0 ? ( 
 <div className="text-neutral-500">No items</div> 
 ) : ( 
 <ul className="space-y-2"> 
 {current.items.map(it => ( 
 <li key={it.key} className="flex items-center justify-between gap-2 border-b pb-1"> 
 <div className="flex-1"> 
 <div className="font-medium">{it.name}</div> 
 <div className="text-sm text-neutral-500">{it.qty} × {eur(it.price)}</div> 
 </div> 
 <div className="flex items-center gap-1"> 
 <button onClick={() => changeQty(it.key, -1)} className="px-2 border rounded">−</button> 
 <button onClick={() => changeQty(it.key, +1)} className="px-2 border rounded">+</button> 
 <button onClick={() => removeItem(it.key)} className="px-2 border rounded">✕</button> 
 </div> 
 <div className="w-24 text-right font-medium">{eur(it.price * it.qty)}</div> 
 </li> 
 ))} 
 </ul> 
 )} 
 <div className="mt-3 border-t pt-2 text-sm space-y-1"> 
 <div className="flex justify-between"><span>Subtotal (excl. VAT)</span><span>{eur(round2(totals.subtotal))}</span></div> 
 <div className="flex justify-between"><span>VAT</span><span>{eur(round2(totals.tax))}</span></div> 
 <div className="flex justify-between font-semibold"><span>Total (incl. VAT)</span><span>{eur(round2(totals.total))}</span></div> 
 </div> 
 <div className="mt-3 flex items-center gap-2"> 
 <label className="flex items-center gap-2"> 
 <input type="checkbox" checked={!!current.cashPaid} onChange={e => setCashPaidForCurrent(e.target.checked)} className="w-4 h-4" /> 
 Paid in cash 
 </label> 
 </div> 
 <div className="mt-3"> 
 <label className="block font-medium mb-1">Comment</label> 
 <textarea value={current.comment || ''} onChange={e => setOrders(prev => { const table = ensureTableState(prev); table.comment = e.target.value; return { ...prev, [selectedTable]: table }; })} className="w-full border rounded p-2 text-sm" placeholder="Add comment..." /> 
 </div> 
 <div className="flex flex-wrap gap-2 mt-3"> 
 <button onClick={downloadVatTicketForCurrent} className="px-3 py-2 border rounded bg-yellow-100 hover:bg-yellow-200">Download VAT Ticket (PDF)</button> 
 <button onClick={writeOverview} className="px-3 py-2 border rounded bg-green-100 hover:bg-green-200">Write to Overview</button> 
 <button onClick={clearCurrentTable} className="px-3 py-2 border rounded bg-red-100 hover:bg-red-200">Clear Table</button> 
 </div> 
 {current.receiptNo && ( 
 <div className="mt-2 text-xs text-neutral-500">Assigned receipt no.: <span className="font-mono">{current.receiptNo}</span></div> 
 )} 
 </div> 
 </div> 
 )} 
 {tab === 'overview' && ( 
 <div> 
 <div className="flex items-center justify-between mb-2"> 
 <h2 className="font-semibold">Closed Orders Overview</h2> 
 <div className="flex gap-2"> 
 <button onClick={exportExcel} className="px-3 py-1 border rounded bg-blue-100 hover:bg-blue-200">Export Excel</button> 
 <button onClick={resetOverview} className="px-3 py-1 border rounded bg-red-100 hover:bg-red-200">Reset</button> 
 </div> 
 </div> 
 {overview.length === 0 ? ( 
 <div className="text-neutral-500">No closed orders yet.</div> 
 ) : ( 
 <ul className="space-y-2"> 
 {overview.map((o, i) => ( 
 <li key={i} className="border rounded p-2 bg-white"> 
 <div className="font-medium flex items-center gap-2 flex-wrap"> 
 <span>Table {o.table} — {new Date(o.timestamp).toLocaleString()}</span> 
 {o.cashPaid && <span className="text-green-600 font-bold">[CASH]</span>} 
 {o.receiptNo && <span className="text-xs text-neutral-500">#{o.receiptNo}</span>} 
 <button onClick={() => downloadVatTicketFromOverview(i)} className="text-sm px-2 py-0.5 border rounded bg-yellow-100 hover:bg-yellow-200">Download VAT Ticket (PDF)</button> 
 </div> 
 <div className="text-sm text-neutral-600">Total: {eur(round2(o.totals.total))} (VAT: {eur(round2(o.totals.tax))})</div> 
 {o.comment && (<div className="text-sm text-neutral-500 mt-1">Comment: {o.comment}</div>)} 
 </li> 
 ))} 
 </ul> 
 )} 
 <div className="mt-3 font-semibold">Grand Total: {eur(round2(grandTotal))}</div> 
 </div> 
 )} 
 </div> 
 ); 
 } 
 ReactDOM.createRoot(document.getElementById('root')).render(<App />); 
 </script> 
</body> 
</html>
